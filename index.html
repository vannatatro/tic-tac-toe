<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Doodle+Shadow&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Schoolbell&family=Short+Stack&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <h1>Tic Tac Toe</h1>
    </div>
    <div class="lower">
        <div class="game">
            <div class="cell1">X</div>
            <div class="cell2">O</div>
            <div class="cell3">X</div>
            <div class="cell4">X</div>
            <div class="cell5">O</div>
            <div class="cell6">X</div>
            <div class="cell7">0</div>
            <div class="cell8">X</div>
            <div class="cell9">O</div>
        </div>
        <div class="info">
            <!-- <div class="buttons">
                <button class="new_game">New game</button>
                <button class="reset">Reset</button>
            </div> -->
            <div class="players">
                <div class="play1">
                    <p>Player 1 : </p>
                    <p class="play1name">Sarah</p>                
                </div>
                <div class="play2">
                    <p>Player 2 :</p>  
                    <p class="play2name">Patrick</p>              
                </div>              
            </div>
            <div class="status">It is Sarah's turn</div>
            <div class="buttons">
                <button class="new_game">New game</button>
                <button class="reset">Reset</button>
            </div>
        </div>
    </div>
    
</body>
<script src="script.js"></script>
</html>
